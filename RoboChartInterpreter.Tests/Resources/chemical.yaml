GasAnalysis:
  initial: NoGas
  initial_vars:
    thr: 1
  states:
    NoGas:
      transitions:
        - to: Analysis
          type: event.input
          event: gas
          variable: gs
    Analysis:
      transitions:
        - to: NoGas
          type: notrigger
          condition: gs == 0
          #action: resume
        - to: GasDetected
          type: notrigger
          condition: gs > 0
    GasDetected:
      transitions:
        - to: _final
          type: notrigger
          condition: gs >= thr
          #action: stop
        - to: Reading
          type: notrigger
          condition: gs < thr
          #action: turn!location(gs)
    Reading:
      transitions:
        - to: Analysis
          type: event.input
          event: gas
          variable: gs
