GasAnalysis:
  initial: NoGas
  initial_vars:
    thr: 1
  states:
    NoGas:
      transitions:
        - to: Analysis
          type: event.input
          event: gas
          variable: gs
    Analysis:
      transitions:
        - to: NoGas
          type: notrigger
          condition: gs == "Status::noGas"
          #action: resume
        - to: GasDetected
          type: notrigger
          condition: gs == "Status::gasD"
    GasDetected:
      transitions:
        - to: _final
          type: notrigger
          #condition: intensity(gs) >= thr
          #action: stop
        - to: Reading
          type: notrigger
          #condition: intensity(gs) < thr
          #action: turn!location(gs)
    Reading:
      transitions:
        - to: Analysis
          type: event.input
          event: gas
          variable: gs
